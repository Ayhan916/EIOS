services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eios
      POSTGRES_PASSWORD: eios_dev
      POSTGRES_DB: eios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eios -d eios_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
