name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint, type-check, unit tests ─────────────────────────────────
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy domain/

      - name: Unit tests
        run: uv run pytest tests/unit/ -q --tb=short

  # ── Backend: integration tests (requires PostgreSQL) ──────────────────────
  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eios
          POSTGRES_PASSWORD: eios_test
          POSTGRES_DB: eios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eios -d eios_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://eios:eios_test@localhost:5432/eios_test
      ENVIRONMENT: development
      SECRET_KEY: ci-test-secret-key-not-used-in-production-only-32chars
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Integration tests
        run: uv run pytest tests/integration/ -q --tb=short -m integration
        continue-on-error: true   # integration tests may not all exist yet

  # ── Security audit ────────────────────────────────────────────────────────
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and pip-audit
        run: pip install uv pip-audit

      - name: Install dependencies
        run: uv sync

      - name: Audit dependencies for known vulnerabilities
        run: |
          uv export --no-dev --format requirements-txt > /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt --ignore-vuln GHSA-9wx4-h78v-vm56
        continue-on-error: true   # advisory — does not block merge

  # ── Frontend: lint and type-check ─────────────────────────────────────────
  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true   # advisory until lint baseline is set

  # ── Docker build verification ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend --tag eios-backend:ci --no-cache

      - name: Build frontend image
        run: |
          docker build ./frontend \
            --tag eios-frontend:ci \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 \
            --no-cache

  # ── Smoke test — verify health endpoint after compose up ──────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: eios
          POSTGRES_PASSWORD: eios_smoke
          POSTGRES_DB: eios_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eios -d eios_smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://eios:eios_smoke@localhost:5432/eios_smoke
      ENVIRONMENT: development
      SECRET_KEY: smoke-test-secret-key-not-used-in-production-32c
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for backend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && echo "Backend ready" && exit 0
            sleep 2
          done
          echo "Backend did not start in time" && exit 1

      - name: Health check
        run: curl -sf http://localhost:8000/health | grep -q '"status"'

      - name: Readiness check
        run: curl -sf http://localhost:8000/health/ready | grep -q '"status"'
