name: Deploy — Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    env:
      KUBECONFIG_DATA: ${{ secrets.STAGING_KUBECONFIG }}
      IMAGE_TAG: sha-${{ github.event.workflow_run.head_sha && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Bitnami Helm repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update chart dependencies
        run: helm dependency update ./helm/eios

      - name: Deploy to staging namespace
        run: |
          IMAGE_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${IMAGE_SHA::7}"
          helm upgrade --install eios-staging ./helm/eios \
            --namespace eios-staging \
            --create-namespace \
            --set image.backend.repository=ghcr.io/${{ github.repository_owner }}/eios-backend \
            --set image.backend.tag=sha-${SHORT_SHA} \
            --set image.frontend.repository=ghcr.io/${{ github.repository_owner }}/eios-frontend \
            --set image.frontend.tag=sha-${SHORT_SHA} \
            --set image.backend.pullPolicy=Always \
            --set image.frontend.pullPolicy=Always \
            --set global.imagePullSecrets[0].name=ghcr-credentials \
            --set ingress.enabled=true \
            --set ingress.host=staging.eios.io \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName=eios-staging-tls \
            --set existingSecret=eios-staging-credentials \
            --set observability.otelEndpoint=http://otel-collector:4318 \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/eios-staging-backend \
            --namespace eios-staging \
            --timeout=3m

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(kubectl exec -n eios-staging deploy/eios-staging-backend -- \
              curl -sf http://localhost:8000/health 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            [ "$STATUS" = "ok" ] && echo "Staging healthy" && exit 0
            sleep 10
          done
          echo "Staging health check failed" && exit 1

      - name: Notify success
        if: success()
        run: |
          echo "Deployed eios-staging @ sha-${SHORT_SHA:-${{ github.sha }}}"
