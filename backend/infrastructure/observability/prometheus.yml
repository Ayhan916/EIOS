# Prometheus scrape configuration for EIOS (M46)
# Usage: docker run -v ./prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: eios

# Alert rules (loaded from alert_rules.yml)
rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # EIOS backend — Prometheus text-format endpoint
  - job_name: eios-backend
    metrics_path: /metrics/prometheus
    scrape_interval: 15s
    static_configs:
      - targets:
          - backend:8000     # prod (internal Docker network)
          - localhost:8000   # local dev

  # PgBouncer exporter (optional — deploy pgbouncer-exporter sidecar)
  # - job_name: pgbouncer
  #   static_configs:
  #     - targets: ["pgbouncer-exporter:9127"]

  # Redis exporter (optional)
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # Node exporter (optional — host metrics)
  # - job_name: node
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
