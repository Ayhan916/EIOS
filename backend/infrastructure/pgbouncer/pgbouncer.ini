;; PgBouncer configuration for EIOS (M45.3)
;;
;; IMPORTANT: pool_mode = session (NOT transaction)
;; EIOS uses SET LOCAL "app.current_org_id" for Row-Level Security.
;; SET LOCAL is scoped to the current transaction and requires that the
;; same PostgreSQL backend connection is reused for the entire session.
;; Transaction mode would silently drop the RLS context mid-request.
;;
;; Tuning notes:
;;   default_pool_size  — concurrent Postgres connections per db/user pair
;;   max_client_conn    — max simultaneous FastAPI/Celery connections to PgBouncer
;;   server_idle_timeout — close idle backend connections after N seconds
;;   reserve_pool_size  — extra connections for bursts (uses reserve_pool_timeout)

[databases]
;; Proxy the eios_db database.
;; In production, replace 'postgres' with the actual hostname/IP of your PostgreSQL server.
eios_db = host=${POSTGRES_HOST} port=${POSTGRES_PORT} dbname=${POSTGRES_DB}

[pgbouncer]
listen_addr = *
listen_port = 6432

;; Authentication — userlist.txt contains "username" "md5hash" pairs.
;; Generate with: echo -n "md5$(echo -n 'password+username' | md5sum | awk '{print $1}')"
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Session pooling is REQUIRED for EIOS because of SET LOCAL RLS context.
pool_mode = session

;; Connection limits
max_client_conn = 1000
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Server connection lifecycle
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0

;; Stats — expose metrics on port 6433 for Prometheus pgbouncer_exporter
stats_period = 60

;; Logging
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

;; Admin console (connect as user 'pgbouncer' to run SHOW POOLS, RELOAD etc.)
admin_users = pgbouncer
