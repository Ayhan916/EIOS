apiVersion: v2
name: eios
description: Enterprise Intelligence Operating System — full-stack Helm chart
type: application
version: 0.23.0
appVersion: "0.23.0"

keywords:
  - eios
  - esg
  - enterprise
  - sustainability

maintainers:
  - name: EIOS Engineering
    email: engineering@eios.io

dependencies:
  # PostgreSQL (Bitnami) — used in staging; production uses managed DB (RDS / CloudSQL).
  # Disable with: --set postgresql.enabled=false
  - name: postgresql
    version: "15.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  # PgBouncer is deployed as a separate Helm release in production (not a subchart).
  # See: helm install pgbouncer bitnami/pgbouncer -f helm/pgbouncer-values.yaml
