{{- if not .Values.existingSecret -}}
{{/* Chart-managed secret — for dev/staging only. Production: use existingSecret. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eios.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eios.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | required "secrets.secretKey is required" | quote }}
  DATABASE_URL: {{ include "eios.databaseUrl" . | quote }}
  REDIS_URL: {{ include "eios.redisUrl" . | quote }}
  REDIS_BLACKLIST_URL: {{ include "eios.redisBlacklistUrl" . | quote }}
  CELERY_BROKER_URL: {{ include "eios.redisUrl" . | replace "/0" "/2" | quote }}
  CELERY_RESULT_BACKEND: {{ include "eios.redisUrl" . | replace "/0" "/2" | quote }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  {{- end }}
{{- end }}
