{{/* Celery Worker */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eios.fullname" . }}-celery-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eios.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  {{- if not .Values.autoscaling.celeryWorker.enabled }}
  replicas: {{ .Values.celery.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "eios.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        {{- include "eios.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "eios.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: celery-worker
          image: {{ include "eios.image" (dict "repo" .Values.image.backend.repository "tag" .Values.image.backend.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command:
            - celery
            - -A
            - infrastructure.celery.app
            - worker
            - --loglevel=info
            - --pool=solo
          envFrom:
            - configMapRef:
                name: {{ include "eios.fullname" . }}-config
            - secretRef:
                name: {{ include "eios.secretName" . }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A infrastructure.celery.app inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.celery.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{/* Celery Beat (single replica — must not run more than once) */}}
{{- if .Values.celery.beat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eios.fullname" . }}-celery-beat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eios.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1   # ALWAYS 1 — multiple beat instances cause duplicate task scheduling
  selector:
    matchLabels:
      {{- include "eios.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
  strategy:
    type: Recreate   # Recreate (not RollingUpdate) — prevent two beat instances overlap
  template:
    metadata:
      labels:
        {{- include "eios.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-beat
    spec:
      serviceAccountName: {{ include "eios.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: celery-beat
          image: {{ include "eios.image" (dict "repo" .Values.image.backend.repository "tag" .Values.image.backend.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command:
            - celery
            - -A
            - infrastructure.celery.app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: {{ include "eios.fullname" . }}-config
            - secretRef:
                name: {{ include "eios.secretName" . }}
          resources:
            {{- toYaml .Values.celery.beat.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
{{- end }}
