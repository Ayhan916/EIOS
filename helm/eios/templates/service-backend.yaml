apiVersion: v1
kind: Service
metadata:
  name: {{ include "eios.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eios.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "eios.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
