# EIOS Helm Chart — production overrides
# Usage: helm upgrade --install eios ./helm/eios -f helm/eios/values.prod.yaml
#
# All secrets must be injected via existingSecret (External Secrets Operator)
# or via --set secrets.* flags from a secrets manager in CI/CD.
# NEVER commit real credentials to this file.

image:
  backend:
    pullPolicy: Always
  frontend:
    pullPolicy: Always

backend:
  replicaCount: 2        # overridden by HPA min=2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

frontend:
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

celery:
  worker:
    replicaCount: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

# Disable in-cluster PostgreSQL — use RDS / CloudSQL in production
postgresql:
  enabled: false

# Enable PgBouncer pointing to external DB
pgbouncer:
  enabled: true

# Disable in-cluster Redis — use ElastiCache / Memorystore in production
redis:
  enabled: false

redisBlacklist:
  enabled: false

# All credentials injected from the external secret
existingSecret: "eios-credentials"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: app.eios.io
  tls:
    enabled: true
    secretName: eios-tls

autoscaling:
  backend:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  celeryWorker:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  backend:
    enabled: true
    minAvailable: 1
  frontend:
    enabled: true
    minAvailable: 1
  celeryWorker:
    enabled: true
    minAvailable: 1

observability:
  otelEndpoint: "http://otel-collector:4318"
  prometheusAnnotations: true
