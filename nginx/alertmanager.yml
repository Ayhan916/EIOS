global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@eios.io'
  # smtp_auth_username: 'alerts@eios.io'
  # smtp_auth_password: '{{ env "SMTP_PASSWORD" }}'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Slack webhook — set SLACK_WEBHOOK_URL in environment
    # slack_configs:
    #   - api_url: '{{ env "SLACK_WEBHOOK_URL" }}'
    #     channel: '#eios-alerts'
    #     title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'critical'
    # PagerDuty — set PAGERDUTY_SERVICE_KEY in environment
    # pagerduty_configs:
    #   - service_key: '{{ env "PAGERDUTY_SERVICE_KEY" }}'
    #     description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
